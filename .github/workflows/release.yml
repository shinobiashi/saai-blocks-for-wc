            # Deploy to WordPress.org SVN
            # Required secrets (repo Settings → Secrets → Actions):
            #   SVN_USERNAME — WordPress.org account username
            #   SVN_PASSWORD — WordPress.org application password
            #     (generate at: https://profiles.wordpress.org/me/profile/applications/)
